version: '3.8'

services:
  # Backend API
  backend:
    build: ./эвакуаторы/backend
    container_name: cartaxi-backend
    ports:
      - "8000:8000"
    volumes:
      - ./эвакуаторы/backend/app:/app/app
      - ./эвакуаторы/backend/logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://cartaxi:cartaxi_password@db:5432/cartaxi_db
      - DEBUG=True
      - API_HOST=0.0.0.0
      - API_PORT=8000
    depends_on:
      - db
    networks:
      - cartaxi-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cartaxi-db
    environment:
      POSTGRES_DB: cartaxi_db
      POSTGRES_USER: cartaxi
      POSTGRES_PASSWORD: cartaxi_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cartaxi-network
    restart: unless-stopped

  # Redis (для кэширования и очередей)
  redis:
    image: redis:7-alpine
    container_name: cartaxi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cartaxi-network
    restart: unless-stopped

  # Adminer (для управления БД)
  adminer:
    image: adminer:latest
    container_name: cartaxi-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - cartaxi-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  cartaxi-network:
    driver: bridge






