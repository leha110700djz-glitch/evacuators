name: Build Android APKs (Client + Driver)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./эвакуаторы
        run: flutter pub get

      # ─── CLIENT APK ───────────────────────────────────────────────
      - name: Build CLIENT APK (release)
        working-directory: ./эвакуаторы
        run: flutter build apk --release --no-tree-shake-icons --target=lib/main.dart

      - name: Copy CLIENT APK to landing
        run: |
          mkdir -p landing/app
          cp эвакуаторы/build/app/outputs/flutter-apk/app-release.apk \
             landing/app/vezunchik-client.apk

      # ─── DRIVER APK ───────────────────────────────────────────────
      - name: Build DRIVER APK (release)
        working-directory: ./эвакуаторы
        run: flutter build apk --release --no-tree-shake-icons --target=lib/main_driver.dart

      - name: Copy DRIVER APK to landing
        run: |
          cp эвакуаторы/build/app/outputs/flutter-apk/app-release.apk \
             landing/app/vezunchik-driver.apk

      # ─── ARTIFACTS ────────────────────────────────────────────────
      - name: Upload CLIENT APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vezunchik-client-apk
          path: landing/app/vezunchik-client.apk
          retention-days: 30

      - name: Upload DRIVER APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vezunchik-driver-apk
          path: landing/app/vezunchik-driver.apk
          retention-days: 30

      # ─── GITHUB RELEASE ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.${{ github.run_number }}
          name: "Везунчик v1.1 (build ${{ github.run_number }})"
          body: |
            ## 📱 Везунчик — Эвакуатор в Москве 24/7

            ### Скачайте APK и установите на Android:

            | Приложение | Описание |
            |------------|----------|
            | 🚗 **vezunchik-client.apk** | Клиентское — вызов эвакуатора |
            | 🚛 **vezunchik-driver.apk** | Водительское — приём заказов |

            ### Что нового:
            - Ребрендинг: «Везунчик» вместо «Эвакуатор Сейчас»
            - Splash-экран с анимацией
            - Онбординг для новых пользователей (3 слайда)
            - Яндекс.Карты — выбор точек подачи и назначения
            - Калькулятор цены с промокодами и бонусами
            - Telegram-уведомления диспетчеру
            - Ночной тариф +20% (авто-определение)
          files: |
            landing/app/vezunchik-client.apk
            landing/app/vezunchik-driver.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── COMMIT APKs to landing ───────────────────────────────────
      - name: Commit APKs to landing/app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add landing/app/vezunchik-client.apk landing/app/vezunchik-driver.apk || true
          git diff --staged --quiet || git commit -m "ci: update APKs build #${{ github.run_number }}"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
